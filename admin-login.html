<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login</title>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // Replace with your Supabase project details
    const supabaseUrl = "https://wpilukuwehxphmorjxzd.supabase.co";
    const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwaWx1a3V3ZWh4cGhtb3JqeHpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwODgxNDMsImV4cCI6MjA5ODY2NDE0M30.PjBUX8c8ZU8YVYUuwb2ypGyfMtHg-jOPlFDausGDKZY";
    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    async function adminLogin() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        document.getElementById("status").textContent = "Login failed: " + error.message;
      } else {
        const user = data.user;
        if (user?.user_metadata?.role === "admin") {
          document.getElementById("status").textContent = "Welcome, Admin!";
          // redirect to admin dashboard
          window.location.href = "/admin-dashboard.html";
        } else {
          document.getElementById("status").textContent = "Access denied. Not an admin.";
        }
      }
    }
  </script>
</head>
<body>
  <h1>Administrator Access</h1>
  <p>This section is reserved for superusers. Please log in with your admin credentials.</p>

  <form onsubmit="event.preventDefault(); adminLogin();">
    <label>Email:</label><br />
    <input type="email" id="email" required /><br /><br />

    <label>Password:</label><br />
    <input type="password" id="password" required /><br /><br />

    <button type="submit">Admin Login</button>
  </form>

  <p id="status"></p>
</body>
</html>
