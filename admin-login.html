<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Clan Admin Login</title>
  <link rel="stylesheet" href="styles-admin.css" />
</head>
<body>
  <header class="header">
    <div class="logo">AETHER CLAN ADMIN</div>
    <div class="nav-links">
      <a href="/" class="nav-link">← PORTAL</a>
    </div>
  </header>

  <div class="container login-container">
    <div class="card login-card">
      <h2>ADMINISTRATOR ACCESS</h2>
      <p style="margin-bottom: 25px; color: #ff8899;">This section is restricted to authorized personnel only.</p>
      
      <form id="admin-login-form" onsubmit="adminLogin(event)">
        <div class="form-group">
          <label for="admin-email">Admin Email</label>
          <input type="email" id="admin-email" required />
        </div>
        <div class="form-group">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" required />
        </div>
        <button type="submit" class="btn btn-primary">AUTHENTICATE</button>
      </form>

      <p id="admin-login-status" class="status-text"></p>
    </div>
  </div>

  <footer class="footer">
    AETHER CLAN ADMIN SYSTEM © 2026 | VERSION 2.0.4 | SECURE CONNECTION ACTIVE
  </footer>

  <script type="module" src="script-admin-login.js"></script>
</body>
</html>
