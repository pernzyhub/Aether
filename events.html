<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Clan Events Management</title>
  <link rel="stylesheet" href="styles-admin.css" />
</head>
<body>
  <header class="header">
    <div class="logo">AETHER CLAN EVENTS</div>
    <div class="nav-links">
      <span id="admin-welcome" style="color: #ff6688; text-transform: uppercase;"></span>
      <a href="/admin-dashboard.html" class="nav-link">DASHBOARD</a>
      <a href="/portal.html" class="nav-link">PORTAL</a>
      <a href="/leaderboard.html" class="nav-link">LEADERBOARD</a>
      <button class="nav-link" style="background: none; cursor: pointer;" onclick="logout()">LOGOUT</button>
    </div>
  </header>

  <div class="container">
    <section class="card">
      <h2>EVENTS MANAGEMENT</h2>
      
      <div class="events-tabs">
        <button class="events-tab is-active" data-tab="event-types" onclick="setEventsTab('event-types')">EVENT TYPES</button>
        <button class="events-tab" data-tab="create" onclick="setEventsTab('create')">CREATE EVENT</button>
        <button class="events-tab" data-tab="manage" onclick="setEventsTab('manage')">MANAGE EVENTS</button>
          <button class="events-tab" data-tab="members" onclick="setEventsTab('members')">MEMBERS</button>
        <button class="events-tab" data-tab="bulk-attendance" onclick="setEventsTab('bulk-attendance')">BULK ATTENDANCE</button>
        <button class="events-tab" data-tab="attendance" onclick="setEventsTab('attendance')">ATTENDANCE LOG</button>
        <button class="events-tab" data-tab="monthly-points" onclick="setEventsTab('monthly-points')">MONTHLY POINTS</button>
      </div>
              <input type="text" id="bulk-search" class="input" placeholder="Search by IGN..." style="margin-bottom: 10px; display: none;" />
      <!-- Event Types Tab -->
      <div id="events-tab-event-types" class="events-tab-content is-active">
        <form id="event-type-form" class="form">
          <div class="form-group">
            <label>Event Type Name</label>
            <input type="text" id="event-type-name" class="input" placeholder="e.g., Guild Meeting, Raid" required />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="event-type-description" class="input" placeholder="Event type description" rows="2"></textarea>
          </div>
          <div class="form-group">
            <label>Color (Hex)</label>
            <input type="text" id="event-type-color" class="input" placeholder="#ff6688" value="#ff6688" />
          </div>
          <button type="submit" class="btn btn-primary" style="background: #ff6688; padding: 12px 20px; font-weight: bold;">+ ADD EVENT TYPE</button>
        </form>
        <p id="event-type-status" class="status-text"></p>
        <div id="event-types-list"></div>
      </div>

      <!-- Create Event Tab -->
      <div id="events-tab-create" class="events-tab-content">
        <form id="event-form" class="form">
          <div class="form-group">
            <label>Event Type</label>
            <select id="event-type-select" class="input" style="background: #1a1a1a; color: #fff; border: 1px solid #ff6688; padding: 10px; font-size: 14px;" required>
              <option value="">Select event type...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Event Name</label>
            <input type="text" id="event-name" class="input" placeholder="Enter event name" required />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="event-description" class="input" placeholder="Enter event description" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>Points</label>
            <input type="number" id="event-points" class="input" placeholder="Enter points" required min="0" />
          </div>
          
          <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
            <input type="hidden" id="is-recurring" value="false" />
            <button type="button" id="recurring-toggle-btn" class="btn btn-secondary" style="padding:6px 10px; background:#333; color:#ff6688; font-weight:bold;">RECURRING: OFF</button>
            <label style="margin: 0; cursor: default; color: #ccc; font-size: 13px;">Click to enable recurrence</label>
          </div>
          
          <div id="recurring-options" style="display: none; background: #1a1a1a; padding: 15px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #333;">
            <div class="form-group">
              <label>Recurrence Type</label>
              <select id="recurrence-type" class="input" style="background: #0a0a0a; color: #fff; border: 1px solid #ff6688; padding: 10px; font-size: 14px;">
                <option value="weekly">Weekly</option>
                <option value="biweekly">Bi-weekly</option>
                <option value="monthly">Monthly</option>
              </select>
            </div>
            
            <div id="weekly-days" style="display: none;">
              <label style="display: block; margin-bottom: 10px;">Day of Week</label>
              <select id="recurrence-day-select" class="input" style="background: #0a0a0a; color: #fff; border: 1px solid #ff6688; padding: 10px; font-size: 14px; margin-bottom: 10px;">
                <option value="">Select day...</option>
                <option value="1">Monday</option>
                <option value="2">Tuesday</option>
                <option value="3">Wednesday</option>
                <option value="4">Thursday</option>
                <option value="5">Friday</option>
                <option value="6">Saturday</option>
                <option value="0">Sunday</option>
              </select>
            </div>
            
            <div class="form-group">
              <label>Time of Day (for recurring)</label>
              <input type="time" id="recurrence-time" class="input" />
            </div>
            <div id="recurrence-sample" style="margin-top:10px; color: #ccc; font-size: 13px;"></div>
          </div>
          
          <div class="form-group">
            <label>Event Date/Time (optional)</label>
            <input type="datetime-local" id="event-date" class="input" />
          </div>
          <button type="submit" class="btn btn-primary">CREATE EVENT</button>
        </form>
        <p id="event-status" class="status-text"></p>
      </div>

      <!-- Manage Events Tab -->
      <div id="events-tab-manage" class="events-tab-content">
        <p id="events-status" class="status-text"></p>
        <div id="events-list"></div>
      </div>

      <!-- Members Sheet Tab -->
      <div id="events-tab-members" class="events-tab-content">
        <p id="members-status" class="status-text"></p>
        <div style="display:flex; gap:12px; align-items:center; margin-bottom:10px;">
          <label style="color:#ccc;">Show months:</label>
          <select id="members-months-range" class="input" style="width:120px;">
            <option value="3">Last 3 months</option>
            <option value="6" selected>Last 6 months</option>
            <option value="12">Last 12 months</option>
          </select>
          <button class="btn btn-secondary" id="members-refresh" style="background:#00ff88; color:#000; font-weight:bold;">REFRESH</button>
        </div>
        <div id="members-sheet" style="overflow-x:auto;"></div>
      </div>

      <!-- Bulk Attendance Tab -->
      <div id="events-tab-bulk-attendance" class="events-tab-content">
        <p id="bulk-status" class="status-text"></p>
        <div class="form" style="margin-bottom: 20px;">
          <div class="form-group">
            <label>Select Event</label>
            <select id="bulk-event-select" class="input" style="background: #1a1a1a; color: #fff; border: 1px solid #ff6688; padding: 10px; font-size: 14px;" required>
              <option value="">Select event to mark attendance...</option>
            </select>
          </div>
          
          <!-- Two Column Layout -->
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <!-- LEFT SIDE: Select Members -->
            <div>
              <label style="display: block; margin-bottom: 10px; font-weight: bold; color: #ff6688;">SELECT MEMBERS</label>
              <input type="text" id="bulk-search" class="input" placeholder="Search by IGN..." style="margin-bottom: 10px;" />
              <div style="border: 2px solid #ff6688; border-radius: 4px; padding: 15px; background: #0a0a0a;">
                <div id="bulk-members-list" style="display: block; gap: 5px; column-gap: 12px;"></div>
              </div>
              <small style="color: #888; margin-top: 5px; display: block;">Showing <span id="member-count" style="color: #ff6688; font-weight: bold;">0</span> members</small>
            </div>
            
            <!-- RIGHT SIDE: Bulk Paste & Points -->
            <div>
              <label style="display: block; margin-bottom: 10px; font-weight: bold; color: #00ff88;">BULK PASTE OPTION</label>
              <div style="background: #1a1a1a; padding: 15px; border-radius: 4px; border: 1px solid #00ff88; margin-bottom: 15px;">
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: #fff; margin-bottom: 15px;">
                  <input type="checkbox" id="bulk-paste-toggle" style="width: 20px; height: 20px; cursor: pointer;" />
                  <span>Use Bulk Paste (paste IGNs separated by commas or newlines)</span>
                </label>
                
                <div id="bulk-paste-area" style="display: none;">
                  <textarea id="bulk-paste-input" class="input" placeholder="Paste member IGNs here&#10;e.g., Player1, Player2, Player3&#10;or&#10;Player1&#10;Player2&#10;Player3" style="width: 100%; margin-bottom: 10px;" rows="10"></textarea>
                  <button class="btn btn-secondary" onclick="parseBulkPaste()" style="background: #00ff88; color: #000; font-weight: bold; padding: 10px 15px; width: 100%;">PARSE PASTE</button>
                </div>
              </div>
              
              <div class="form-group">
                <label>Points to Award (leave empty to use event points)</label>
                <input type="number" id="bulk-points" class="input" min="0" />
              </div>
            </div>
          </div>
          
          <button class="btn btn-success" onclick="applyBulkAttendance()" style="background: #00ff88; color: #000; font-weight: bold; padding: 12px 20px; font-size: 16px; width: 100%;">✓ APPLY ATTENDANCE</button>
        </div>
      </div>

      <!-- Attendance Log Tab -->
      <div id="events-tab-attendance" class="events-tab-content">
        <p id="attendance-status" class="status-text"></p>
        <div id="attendance-list"></div>
      </div>

      <!-- Monthly Points Tab -->
      <div id="events-tab-monthly-points" class="events-tab-content">
        <div class="form" style="margin-bottom: 20px;">
          <div class="form-group">
            <label>Select Month</label>
            <input type="month" id="monthly-points-filter" class="input" />
          </div>
          <button class="btn btn-secondary" onclick="loadMonthlyPoints()">VIEW POINTS</button>
        </div>
        <p id="monthly-status" class="status-text"></p>
        <div id="monthly-points-table"></div>
      </div>
    </section>
  </div>

  <footer class="footer">
    AETHER CLAN ADMIN SYSTEM © 2026 | VERSION 2.0.4 | ALL ACTIONS LOGGED
  </footer>

  <script type="module" src="script-events.js"></script>
</body>
</html>
