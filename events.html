<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Clan Events Management</title>
  <link rel="stylesheet" href="styles-admin.css" />
</head>
<body>
  <header class="header">
    <div class="logo">AETHER CLAN EVENTS</div>
    <div class="nav-links">
      <span id="admin-welcome" style="color: #ff6688; text-transform: uppercase;"></span>
      <a href="/admin-dashboard.html" class="nav-link">DASHBOARD</a>
      <a href="/portal.html" class="nav-link">PORTAL</a>
      <button class="nav-link" style="background: none; cursor: pointer;" onclick="logout()">LOGOUT</button>
    </div>
  </header>

  <div class="container">
    <section class="card">
      <h2>EVENTS MANAGEMENT</h2>
      
      <div class="events-tabs">
        <button class="events-tab is-active" data-tab="event-types" onclick="setEventsTab('event-types')">EVENT TYPES</button>
        <button class="events-tab" data-tab="create" onclick="setEventsTab('create')">CREATE EVENT</button>
        <button class="events-tab" data-tab="manage" onclick="setEventsTab('manage')">MANAGE EVENTS</button>
        <button class="events-tab" data-tab="bulk-attendance" onclick="setEventsTab('bulk-attendance')">BULK ATTENDANCE</button>
        <button class="events-tab" data-tab="attendance" onclick="setEventsTab('attendance')">ATTENDANCE LOG</button>
        <button class="events-tab" data-tab="monthly-points" onclick="setEventsTab('monthly-points')">MONTHLY POINTS</button>
      </div>

      <!-- Event Types Tab -->
      <div id="events-tab-event-types" class="events-tab-content is-active">
        <form id="event-type-form" class="form">
          <div class="form-group">
            <label>Event Type Name</label>
            <input type="text" id="event-type-name" class="input" placeholder="e.g., Guild Meeting, Raid" required />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="event-type-description" class="input" placeholder="Event type description" rows="2"></textarea>
          </div>
          <div class="form-group">
            <label>Default Points</label>
            <input type="number" id="event-type-points" class="input" placeholder="Default points" required min="0" />
          </div>
          <div class="form-group">
            <label>Color (Hex)</label>
            <input type="text" id="event-type-color" class="input" placeholder="#ff6688" value="#ff6688" />
          </div>
          <button type="submit" class="btn btn-primary" style="background: #ff6688; padding: 12px 20px; font-weight: bold;">+ ADD EVENT TYPE</button>
        </form>
        <p id="event-type-status" class="status-text"></p>
        <div id="event-types-list"></div>
      </div>

      <!-- Create Event Tab -->
      <div id="events-tab-create" class="events-tab-content">
        <form id="event-form" class="form">
          <div class="form-group">
            <label>Event Type</label>
            <select id="event-type-select" class="input" required>
              <option value="">Select event type...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Event Name</label>
            <input type="text" id="event-name" class="input" placeholder="Enter event name" required />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="event-description" class="input" placeholder="Enter event description" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>Points</label>
            <input type="number" id="event-points" class="input" placeholder="Enter points" required min="0" />
          </div>
          
          <div class="form-group">
            <label>
              <input type="checkbox" id="is-recurring" />
              Make this a recurring event
            </label>
          </div>
          
          <div id="recurring-options" style="display: none;">
            <div class="form-group">
              <label>Recurrence Type</label>
              <select id="recurrence-type" class="input">
                <option value="weekly">Weekly</option>
                <option value="biweekly">Bi-weekly</option>
                <option value="monthly">Monthly</option>
              </select>
            </div>
            
            <div id="weekly-days" style="display: none;">
              <label>Days of Week</label>
              <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                <label><input type="checkbox" value="0" name="recurrence-days" /> Sunday</label>
                <label><input type="checkbox" value="1" name="recurrence-days" /> Monday</label>
                <label><input type="checkbox" value="2" name="recurrence-days" /> Tuesday</label>
                <label><input type="checkbox" value="3" name="recurrence-days" /> Wednesday</label>
                <label><input type="checkbox" value="4" name="recurrence-days" /> Thursday</label>
                <label><input type="checkbox" value="5" name="recurrence-days" /> Friday</label>
                <label><input type="checkbox" value="6" name="recurrence-days" /> Saturday</label>
              </div>
            </div>
            
            <div class="form-group">
              <label>Time of Day (for recurring)</label>
              <input type="time" id="recurrence-time" class="input" />
            </div>
          </div>
          
          <div class="form-group">
            <label>Event Date/Time</label>
            <input type="datetime-local" id="event-date" class="input" />
          </div>
          <button type="submit" class="btn btn-primary">CREATE EVENT</button>
        </form>
        <p id="event-status" class="status-text"></p>
      </div>

      <!-- Manage Events Tab -->
      <div id="events-tab-manage" class="events-tab-content">
        <p id="events-status" class="status-text"></p>
        <div id="events-list"></div>
      </div>

      <!-- Bulk Attendance Tab -->
      <div id="events-tab-bulk-attendance" class="events-tab-content">
        <p id="bulk-status" class="status-text"></p>
        <div class="form" style="margin-bottom: 20px;">
          <div class="form-group">
            <label>Select Event</label>
            <select id="bulk-event-select" class="input" required>
              <option value="">Select event to mark attendance...</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Search Members</label>
            <input type="text" id="bulk-search" class="input" placeholder="Type member IGN to search..." />
          </div>
          
          <div class="form-group">
            <label>Select Members (Scroll to see all)</label>
            <div style="border: 1px solid #ff6688; border-radius: 4px; height: 300px; overflow-y: auto; padding: 10px; background: #0a0a0a;">
              <div id="bulk-members-list"></div>
            </div>
            <small style="color: #888; margin-top: 5px;">Showing <span id="member-count">0</span> members</small>
          </div>
          
          <div class="form-group">
            <label>
              <input type="checkbox" id="bulk-paste-toggle" />
              Use Bulk Paste (paste IGNs separated by commas or newlines)
            </label>
          </div>
          
          <div id="bulk-paste-area" style="display: none;">
            <textarea id="bulk-paste-input" class="input" placeholder="Paste member IGNs here (comma or newline separated)&#10;e.g., Player1, Player2&#10;or&#10;Player1&#10;Player2" rows="4"></textarea>
            <button class="btn btn-secondary" onclick="parseBulkPaste()" style="margin-top: 10px;">PARSE PASTE</button>
          </div>
          
          <div class="form-group" style="margin-top: 15px;">
            <label>Points to Award (leave empty to use event points)</label>
            <input type="number" id="bulk-points" class="input" min="0" />
          </div>
          
          <button class="btn btn-success" onclick="applyBulkAttendance()" style="background: #00ff88; color: #000; font-weight: bold; padding: 12px 20px; font-size: 16px;">✓ APPLY ATTENDANCE</button>
        </div>
      </div>

      <!-- Attendance Log Tab -->
      <div id="events-tab-attendance" class="events-tab-content">
        <p id="attendance-status" class="status-text"></p>
        <div id="attendance-list"></div>
      </div>

      <!-- Monthly Points Tab -->
      <div id="events-tab-monthly-points" class="events-tab-content">
        <div class="form" style="margin-bottom: 20px;">
          <div class="form-group">
            <label>Select Month</label>
            <input type="month" id="monthly-points-filter" class="input" />
          </div>
          <button class="btn btn-secondary" onclick="loadMonthlyPoints()">VIEW POINTS</button>
        </div>
        <p id="monthly-status" class="status-text"></p>
        <div id="monthly-points-table"></div>
      </div>
    </section>
  </div>

  <footer class="footer">
    AETHER CLAN ADMIN SYSTEM © 2026 | VERSION 2.0.4 | ALL ACTIONS LOGGED
  </footer>

  <script type="module" src="script-events.js"></script>
</body>
</html>
