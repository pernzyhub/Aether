<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabaseUrl = "https://wpilukuwehxphmorjxzd.supabase.co";
    const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwaWx1a3V3ZWh4cGhtb3JqeHpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwODgxNDMsImV4cCI6MjA5ODY2NDE0M30.PjBUX8c8ZU8YVYUuwb2ypGyfMtHg-jOPlFDausGDKZY";
    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    async function loadDashboard() {
      const { data } = await supabase.auth.getSession();
      const user = data.session?.user;

      if (!user) {
        document.getElementById("status").textContent = "Not logged in.";
        return;
      }

      if (user.user_metadata?.role !== "admin") {
        document.getElementById("status").textContent = "Access denied. You are not an admin.";
        return;
      }

      // Show admin info
      document.getElementById("status").textContent = "Welcome, Admin!";
      document.getElementById("email").textContent = user.email;
      document.getElementById("role").textContent = user.user_metadata.role;

      // Example: fetch members table (if you have one)
      const { data: members, error } = await supabase.from("members").select("*");
      if (error) {
        document.getElementById("members").textContent = "Error loading members: " + error.message;
      } else {
        document.getElementById("members").textContent = JSON.stringify(members, null, 2);
      }
    }

    window.onload = loadDashboard;
  </script>
</head>
<body>
  <h1>Admin Dashboard</h1>
  <p id="status">Loading...</p>

  <h2>Admin Info</h2>
  <p>Email: <span id="email"></span></p>
  <p>Role: <span id="role"></span></p>

  <h2>Members Data</h2>
  <pre id="members"></pre>
</body>
</html>
