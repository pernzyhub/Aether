<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Member Attendance Spreadsheet</title>
  <link rel="stylesheet" href="styles-portal.css" />
  <style>
    #attendance-sheet {
      overflow: auto;
      max-height: calc(100vh - 240px);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #222;
      background: rgba(5, 10, 10, 0.95);
    }

    #attendance-sheet table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      font-size: 0.92rem;
      color: #ddd;
    }

    #attendance-sheet th,
    #attendance-sheet td {
      padding: 10px 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
      vertical-align: middle;
      white-space: normal;
      word-break: break-word;
      background: rgba(5, 10, 10, 0.95);
    }

    #attendance-sheet th {
      background: rgba(3, 14, 12, 0.95);
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 4;
    }

    #attendance-sheet th:first-child,
    #attendance-sheet td:first-child {
      position: sticky;
      left: 0;
      background: rgba(3, 14, 12, 0.98);
      z-index: 6;
      text-align: left;
    }

    #attendance-sheet th:first-child {
      z-index: 8;
    }

    #attendance-sheet tbody tr:nth-child(odd) td {
      background: rgba(255, 255, 255, 0.025);
    }

    #attendance-sheet tbody tr:hover td {
      background: rgba(0, 255, 136, 0.08);
    }

    #attendance-sheet th small {
      display: block;
      margin-top: 6px;
      color: #999;
      font-size: 0.78rem;
      line-height: 1.2;
    }

    @media (max-width: 1100px) {
      #attendance-sheet table {
        min-width: 680px;
      }
    }

    @media (max-width: 850px) {
      #attendance-sheet table {
        min-width: 560px;
      }
    }

    @media (max-width: 700px) {
      #attendance-sheet table {
        min-width: 460px;
      }
    }

    .attendance-legend {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      color: #ccc;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .attendance-legend span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #aaa;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .attendance-attended {
      background: rgba(0, 255, 136, 0.12);
      color: #b8ffb8;
    }

    .attendance-pending {
      background: rgba(255, 176, 0, 0.12);
      color: #ffe1a0;
    }

    .attendance-missing {
      background: rgba(255, 255, 255, 0.04);
      color: #888;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">AETHER CLAN</div>
    <div class="nav-links">
      <a href="/portal.html" class="nav-link">HOME</a>
      <a href="/request-items.html" class="nav-link">REQUESTS</a>
      <a href="/member-attendance.html" class="nav-link active">ATTENDANCE</a>
      <a href="/leaderboard.html" class="nav-link">LEADERBOARD</a>
      <a href="/settings.html" class="nav-link">SETTINGS</a>
      <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>
  </header>

  <main class="container" style="grid-template-columns: 1fr;">
    <section class="card">
      <div style="display:flex; gap:12px; align-items:center; margin-bottom:12px; flex-wrap:wrap;">
        <label style="color:#ccc">Month:</label>
        <input type="month" id="sheet-month" class="input" />
        <button id="sheet-load" class="btn btn-secondary" style="background:#00ff88; color:#000; font-weight:700;">LOAD</button>
      </div>

      <div class="attendance-legend">
        <span><span class="legend-swatch" style="background:#0f8;"></span>Attended</span>
        <span><span class="legend-swatch" style="background:#ffb000;"></span>RSVP / Pending</span>
        <span><span class="legend-swatch" style="background:rgba(255,255,255,0.05);"></span>No record</span>
      </div>

      <div id="attendance-sheet" style="overflow:auto; background:#0a0a0a; padding:12px; border-radius:8px; border:1px solid #222;"></div>
    </section>
  </main>

  <script type="module" src="member-attendance.js"></script>
</body>
</html>
