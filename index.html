<!DOCTYPE html>
<html>
<head>
  <title>Supabase Discord Login</title>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabaseUrl = "https://wpilukuwehxphmorjxzd.supabase.co";
    const supabaseAnonKey = "YOUR_ANON_KEY";
    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    async function login() {
      await supabase.auth.signInWithOAuth({ provider: "discord" });
    }

    async function getUser() {
      const { data } = await supabase.auth.getSession();
      document.getElementById("user").textContent =
        JSON.stringify(data.session?.user || "Not logged in", null, 2);
    }

    window.login = login;
    window.getUser = getUser;
  </script>
</head>
<body>
  <h1>Supabase Discord Auth</h1>
  <button onclick="login()">Login with Discord</button>
  <button onclick="getUser()">Check User</button>
  <pre id="user"></pre>
</body>
</html>
