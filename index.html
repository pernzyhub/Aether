<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Clan Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="matrix-canvas"></canvas>
  <div class="container">
    <div class="header">
      <h1>AETHERCLAN</h1>
    </div>

    <div class="login-container">
      <div class="login-box">
        <h2>MEMBER LOGIN</h2>
        <p>Authenticate with Discord to access clan features and secure channels.</p>
        <div class="button-group">
          <button class="discord-btn" onclick="discordLogin()">
            LOGIN WITH DISCORD
          </button>
        </div>
        <p style="margin-top: 15px; color: #00cc66; font-size: 0.9rem;">Used discord login once for registration.</p>
        
        <hr style="border-color: #00ff41; border-style: solid; margin: 20px 0;">
        
        <h3>Login with IGN</h3>
        <form id="member-login-form" onsubmit="event.preventDefault(); memberLogin();">
          <div class="form-group">
            <label for="accessCode">AETHER CODE</label>
            <input type="text" id="accessCode" placeholder="Enter access code" required />
          </div>
          <div class="form-group">
            <label for="memberIgn">IGN</label>
            <input type="text" id="memberIgn" required />
          </div>
          <div class="form-group">
            <label for="memberPassword">Password</label>
            <input type="password" id="memberPassword" required />
          </div>
          <button type="submit" class="form-submit-btn">
            LOGIN
          </button>
        </form>
        <p id="memberStatus" class="status-text"></p>
      </div>

      <div class="login-box">
        <h2>ADMIN LOGIN</h2>
        <p>Restricted access for clan administrators. Requires valid credentials.</p>
        <div class="button-group">
          <button class="admin-btn" onclick="toggleAdminDropdown()">
            ADMIN PANEL
          </button>
        </div>
        <div id="adminDropdown" class="admin-dropdown">
          <form class="admin-form" onsubmit="event.preventDefault(); adminLogin();">
            <div class="form-group">
              <label for="adminAccessCode">AETHER CODE</label>
              <input type="text" id="adminAccessCode" placeholder="Enter access code" required />
            </div>
            <div class="form-group">
              <label for="adminEmail">Email</label>
              <input type="email" id="adminEmail" required />
            </div>
            <div class="form-group">
              <label for="adminPassword">Password</label>
              <input type="password" id="adminPassword" required />
            </div>
            <button type="submit" class="form-submit-btn">
              Authenticate
            </button>
          </form>
          <p id="adminStatus" class="status-text"></p>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
