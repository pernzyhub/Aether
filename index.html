<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Clan Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="matrix-canvas"></canvas>
  <div class="container">
    <div class="header">
      <h1>AETHERCLAN</h1>
    </div>

    <div class="login-shell">
      <div class="slider-glow"></div>
      <div class="login-panel left-panel active-panel">
        <div class="panel-label">MEMBER ACCESS</div>
        <h2>ENTER YOUR CREDENTIALS</h2>
        <p>Sign in with your username and password to enter the portal.</p>
        <form id="member-login-form" onsubmit="event.preventDefault(); memberLogin();">
          <div class="form-group">
            <label for="memberIgn">USERNAME</label>
            <input type="text" id="memberIgn" required />
          </div>
          <div class="form-group">
            <label for="memberPassword">PASSWORD</label>
            <input type="password" id="memberPassword" required />
          </div>
          <button type="submit" class="form-submit-btn">LOGIN</button>
        </form>
        <p id="memberStatus" class="status-text"></p>
      </div>

      <div class="login-panel right-panel">
        <div class="panel-label">ADMIN ACCESS</div>
        <h2>AUTHORIZED ENTRY</h2>
        <p>Restricted access for clan administrators and operators.</p>
        <div class="button-group">
          <button class="admin-btn" onclick="toggleAdminDropdown()">ADMIN PANEL</button>
        </div>
        <div id="adminDropdown" class="admin-dropdown">
          <form class="admin-form" onsubmit="event.preventDefault(); adminLogin();">
            <div class="form-group">
              <label for="adminEmail">EMAIL</label>
              <input type="email" id="adminEmail" required />
            </div>
            <div class="form-group">
              <label for="adminPassword">PASSWORD</label>
              <input type="password" id="adminPassword" required />
            </div>
            <button type="submit" class="form-submit-btn">AUTHENTICATE</button>
          </form>
          <p id="adminStatus" class="status-text"></p>
        </div>
      </div>

      <div class="switcher">
        <button class="switch-btn active" data-side="member" onclick="setLoginSide('member')">MEMBER</button>
        <button class="switch-btn" data-side="admin" onclick="setLoginSide('admin')">ADMIN</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
