<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AetherClan Landing</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e2f;
      color: #f0f0f0;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #ffd700;
    }
    .login-box {
      margin: 20px auto;
      padding: 20px;
      background: #2a2a3d;
      border-radius: 8px;
      width: 320px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .discord-btn {
      background: #5865f2;
      color: white;
    }
    .admin-btn {
      background: #ff4444;
      color: white;
    }
    .logout-btn {
      background: #444;
      color: white;
    }
    pre {
      text-align: left;
      background: #111;
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
    }
  </style>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabaseUrl = "https://wpilukuwehxphmorjxzd.supabase.co";
    const supabaseAnonKey = "YOUR_ANON_KEY"; // replace with your real anon key
    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    async function discordLogin() {
      await supabase.auth.signInWithOAuth({ provider: "discord" });
    }

    async function logout() {
      await supabase.auth.signOut();
      document.getElementById("user").textContent = "Logged out.";
    }

    // Redirect to portal after login
    supabase.auth.onAuthStateChange((_event, session) => {
      if (session?.user) {
        window.location.href = "/portal.html";
      }
    });

    // Show session info on page load
    window.addEventListener("load", async () => {
      const { data } = await supabase.auth.getSession();
      document.getElementById("user").textContent =
        JSON.stringify(data.session?.user || "Not logged in", null, 2);
    });

    window.discordLogin = discordLogin;
    window.logout = logout;
  </script>
</head>
<body>
  <h1>Welcome to AetherClan</h1>
  <p>Choose your login path below:</p>

  <div class="login-box">
    <h2>Member Login</h2>
    <p>Log in with Discord to access community features.</p>
    <button class="discord-btn" onclick="discordLogin()">Login with Discord</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
    <pre id="user">Not logged in</pre>
  </div>

  <div class="login-box">
    <h2>Admin Login</h2>
    <p>Reserved for superusers. Use your admin credentials.</p>
    <button class="admin-btn" onclick="window.location.href='/admin-login'">
      Admin Login
    </button>
  </div>
</body>
</html>
