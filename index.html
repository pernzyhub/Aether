<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherClan - Cyberpunk 2026</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AETHERCLAN</h1>
      <p class="subtitle">CYBERPUNK 2026 - SYSTEM ACCESS</p>
    </div>

    <div class="login-container">
      <div class="login-box">
        <h2>MEMBER LOGIN</h2>
        <p>Authenticate with Discord to access clan features and secure channels.</p>
        <div class="button-group">
          <button class="discord-btn" onclick="discordLogin()">
            LOGIN WITH DISCORD
          </button>
          <button class="logout-btn" onclick="logout()">
            LOGOUT
          </button>
        </div>
        <div class="session-info">
          <pre id="user">Not logged in</pre>
        </div>
      </div>

      <div class="login-box">
        <h2>ADMIN LOGIN</h2>
        <p>Restricted access for clan administrators. Requires valid credentials.</p>
        <div class="button-group">
          <button class="admin-btn" onclick="toggleAdminDropdown()">
            ADMIN PANEL
          </button>
        </div>
        <div id="adminDropdown" class="admin-dropdown">
          <form class="admin-form" onsubmit="event.preventDefault(); adminLogin();">
            <div class="form-group">
              <label for="adminEmail">Email</label>
              <input type="email" id="adminEmail" required />
            </div>
            <div class="form-group">
              <label for="adminPassword">Password</label>
              <input type="password" id="adminPassword" required />
            </div>
            <button type="submit" class="form-submit-btn">
              Authenticate
            </button>
          </form>
          <p id="adminStatus" class="status-text"></p>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
