<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Clan Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="crest-mark" aria-hidden="true">✦</div>
      <div>
        <h1>AETHER CLAN</h1>
        <p class="subtitle">Guild hall access • members & officers</p>
      </div>
    </div>
    <div id="adminPreviewBadge" style="display:none; position:fixed; top:12px; left:12px; background:#d4af37; color:#071; padding:6px 10px; border-radius:8px; z-index:99999; font-weight:700;">ADMIN PREVIEW</div>

    <div class="login-shell">
      <div class="login-card">
        <div class="login-title">
          <div>
            <div class="panel-label">LOGIN MODE</div>
            <h2 id="loginModeTitle">MEMBER LOGIN</h2>
            <p id="loginModeText">Enter your IGN and password to access the clan portal.</p>
          </div>
          <button id="loginToggleBtn" class="toggle-btn" type="button" onclick="toggleLoginMode()">SWITCH TO ADMIN</button>
        </div>

        <div class="form-panel" id="memberFormPanel">
          <form id="member-login-form" onsubmit="event.preventDefault(); memberLogin();">
            <div class="form-group">
              <label for="memberIgn">USERNAME</label>
              <input type="text" id="memberIgn" required />
            </div>
            <div class="form-group">
              <label for="memberPassword">PASSWORD</label>
              <input type="password" id="memberPassword" required />
            </div>
            <button type="submit" class="form-submit-btn">LOGIN</button>
          </form>
          <p id="memberStatus" class="status-text"></p>
        </div>

        <div class="form-panel form-panel-hidden" id="adminFormPanel">
          <form id="admin-login-form" onsubmit="event.preventDefault(); adminLogin();">
            <div class="form-group">
              <label for="adminEmail">EMAIL</label>
              <input type="email" id="adminEmail" required />
            </div>
            <div class="form-group">
              <label for="adminPassword">PASSWORD</label>
              <input type="password" id="adminPassword" required />
            </div>
            <button type="submit" class="form-submit-btn">AUTHENTICATE</button>
          </form>
          <p id="adminStatus" class="status-text"></p>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
