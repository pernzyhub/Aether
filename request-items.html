<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Clan - Request Items</title>
  <link rel="stylesheet" href="styles-portal.css" />
</head>
<body>
  <header class="header">
    <div class="logo">AETHER CLAN</div>
    <div class="nav-links">
      <span id="welcome-text" class="welcome-text" style="color: #00ff88;"></span>
      <a href="/portal.html" class="nav-link">HOME</a>
      <a href="/request-items.html" class="nav-link active">REQUESTS</a>
      <a href="/member-attendance.html" class="nav-link">ATTENDANCE</a>
      <a href="/leaderboard.html" class="nav-link">LEADERBOARD</a>
      <a href="/settings.html" class="nav-link">SETTINGS</a>
      <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>
  </header>

  <div class="container request-page">
    <section class="card request-form-card request-column">
      <h2>REQUEST AN ITEM</h2>
      <form id="request-form" onsubmit="submitRequest(event)">
        <div class="form-group">
          <label for="item-select">Select Item</label>
          <select id="item-select" required>
            <option value="">Loading items...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="quantity">Quantity</label>
          <input type="number" id="quantity" min="1" value="1" required />
        </div>
        <div class="form-group">
          <label for="notes">Notes (Optional)</label>
          <textarea id="notes"></textarea>
        </div>
        <div class="form-group">
          <label for="proof-image">Proof Image (Optional)</label>
          <input type="file" id="proof-image" accept="image/*" />
        </div>
        <button type="submit" class="btn btn-primary">SUBMIT REQUEST</button>
      </form>
      <p id="request-status" class="status-text"></p>
    </section>

    <section class="card request-feed-card request-column">
      <div class="card-heading">
        <h2>REQUEST FEED</h2>
        <div class="card-controls">
          <label class="control-label" for="request-filter">Filter</label>
          <select id="request-filter" class="sort-select">
            <option value="all">All</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="denied">Denied</option>
          </select>
          <label class="control-label" for="request-sort">Sort</label>
          <select id="request-sort" class="sort-select">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
          </select>
        </div>
        <span class="card-badge">LIVE</span>
      </div>
      <div id="my-requests" class="request-feed"></div>
    </section>

    <section class="card request-summary-card request-column">
      <div class="card-heading">
        <h2>ITEM SUMMARY</h2>
        <div class="card-controls summary-controls">
          <select id="summary-select" class="sort-select summary-select" aria-label="Choose item summary">
            <option value="">Loading...</option>
          </select>
        </div>
        <span class="card-badge">GROUPED</span>
      </div>
      <div id="request-summary" class="request-summary"></div>
    </section>
  </div>

  <!-- Image Modal -->
  <div id="image-modal" class="image-modal">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <img id="modal-image" class="modal-image" src="" alt="Proof image" />
    </div>
  </div>

  <footer class="footer">
    AETHER CLAN © 2026 | SYSTEM VERSION 2.0.4 | ALL RIGHTS RESERVED
  </footer>

  <script type="module" src="script-request-items.js"></script>
</body>
</html>
