<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Clan - Settings</title>
  <link rel="stylesheet" href="styles-portal.css" />
</head>
<body>
  <header class="header">
    <div class="logo">AETHER CLAN</div>
    <div class="nav-links">
      <span id="welcome-text" class="welcome-text">LOADING USER...</span>
      <a id="return-to-admin-panel-btn" href="/admin-dashboard.html" class="nav-link" style="display:none; background:#ff6688; color:#fff;">RETURN TO ADMIN PANEL</a>
      <a href="/portal.html" class="nav-link">HOME</a>
      <a href="/request-items.html" class="nav-link">REQUESTS</a>
      <a href="/bv-request.html" class="nav-link">BV REQUEST</a>
      <a href="/member-attendance.html" class="nav-link">ATTENDANCE</a>
      <a href="/leaderboard.html" class="nav-link">LEADERBOARD</a>
      <a href="/settings.html" class="nav-link active">SETTINGS</a>
      <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>
  </header>

  <div class="container" style="grid-template-columns: 1fr;">
    <section class="card">
      <h2>PROFILE SETTINGS</h2>
      <p style="margin-bottom: 20px; color: #00cc66;">Update your password for the clan portal.</p>
      
      <form id="settings-form" onsubmit="event.preventDefault(); saveSettings();">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" placeholder="Enter your new password" required />
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your new password" required />
        </div>
        
        <button type="submit" class="btn btn-primary">SAVE CHANGES</button>
      </form>
      
      <p id="settings-status" class="status-text"></p>
    </section>
  </div>

  <footer class="footer">
    AETHER CLAN © 2026 | SYSTEM VERSION 2.0.4 | ALL RIGHTS RESERVED
  </footer>

  <script type="module" src="script-settings.js"></script>
</body>
</html>
