<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherClan Portal</title>
  <link rel="stylesheet" href="styles-portal.css" />
</head>
<body>
  <!-- IGN Setup Modal (kept for when button is clicked) -->
  <div id="ign-modal" class="modal hidden">
    <div class="modal-content">
      <h2>SET YOUR IN-GAME NAME (IGN)</h2>
      <p>Please set your clan IGN. This is required for clan features.</p>
      <form id="ign-form" onsubmit="saveIgn(event)">
        <div class="form-group">
          <label for="ign-input">YOUR IGN</label>
          <input type="text" id="ign-input" required placeholder="Enter your IGN" />
        </div>
        <button type="submit" class="btn btn-primary">SAVE IGN</button>
      </form>
      <p id="ign-status" class="status-text"></p>
    </div>
  </div>

  <header class="header">
    <div class="logo">AETHERCLAN</div>
    <div class="nav-links">
      <div class="header-menu">
        <a href="/portal.html" class="nav-link nav-link-pill active">HOME</a>
        <a href="/request-items.html" class="nav-link nav-link-pill">REQUESTS</a>
        <a href="/settings.html" class="nav-link nav-link-pill">SETTINGS</a>
        <a id="admin-menu-item" href="/admin-dashboard.html" class="nav-link nav-link-pill" style="display: none;">ADMIN</a>
      </div>
      <div class="nav-actions">
        <span id="welcome-text" class="welcome-text">LOADING USER...</span>
        <button id="change-ign-btn" class="btn btn-primary" style="width: auto; padding: 5px 10px; font-size: 0.8rem; display: none;" onclick="showIgnModal()">CHANGE YOUR IGN</button>
        <button class="logout-btn" onclick="logout()" style="margin: 0;">LOGOUT</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>ANNOUNCEMENTS</h2>
      <div id="announcements-list" class="announcements-list">
        <p>Loading announcements...</p>
      </div>
    </section>

    <section class="card">
      <h2>CLAN RULES</h2>
      <div id="rules-list" class="rules-list">
        <p>Loading rules...</p>
      </div>
    </section>

  </main>

  <footer class="footer">
    AETHERCLAN © 2026 | SYSTEM VERSION 2.0.4 | ALL RIGHTS RESERVED
  </footer>

  <script type="module" src="script-portal.js"></script>
</body>
</html>
