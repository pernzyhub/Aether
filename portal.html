<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Clan Portal</title>
  <link rel="stylesheet" href="styles-portal.css" />
</head>
<body>
  <header class="header">
    <div class="logo">AETHER CLAN</div>
    <div class="nav-links">
      <div class="header-menu">
        <a href="/portal.html" class="nav-link nav-link-pill active">HOME</a>
        <a href="/request-items.html" class="nav-link nav-link-pill">REQUESTS</a>
        <a href="/portal.html#events" class="nav-link nav-link-pill">EVENTS</a>
        <a href="/settings.html" class="nav-link nav-link-pill">SETTINGS</a>
        <a id="admin-menu-item" href="/admin-dashboard.html" class="nav-link nav-link-pill" style="display: none;">ADMIN</a>
      </div>
      <div class="nav-actions">
        <span id="welcome-text" class="welcome-text">LOADING USER...</span>
        <a href="/settings.html" class="nav-link nav-link-pill">PASSWORD</a>
        <button class="logout-btn" onclick="logout()" style="margin: 0;">LOGOUT</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>ANNOUNCEMENTS</h2>
      <div id="announcements-list" class="announcements-list">
        <p>Loading announcements...</p>
      </div>
    </section>

    <section class="card" id="upcoming-card">
      <h2>NEXT EVENT</h2>
      <div id="upcoming-event" style="min-height:80px; display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <div id="upcoming-info" style="flex:1">
          <p style="color:#aaa;">Loading next event...</p>
        </div>
        <div id="upcoming-countdown" style="min-width:220px; text-align:center; background:#0a0a0a; padding:12px; border-radius:6px; border:1px solid #333;">
        </div>
      </div>
    </section>

    <section class="card">
      <h2>CLAN RULES</h2>
      <div id="rules-list" class="rules-list">
        <p>Loading rules...</p>
      </div>
    </section>

    <section class="card" id="events">
      <h2>EVENTS & ATTENDANCE</h2>
      <div id="events-list" class="events-list">
        <p>Loading events...</p>
      </div>
    </section>

  </main>

  <footer class="footer">
    AETHER CLAN © 2026 | SYSTEM VERSION 2.0.4 | ALL RIGHTS RESERVED
  </footer>

  <script type="module" src="script-portal.js"></script>
</body>
</html>
