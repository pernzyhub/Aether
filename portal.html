<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AetherClan Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #f0f0f0;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #ffd700;
    }
    .box {
      margin: 20px auto;
      padding: 20px;
      background: #2a2a3d;
      border-radius: 8px;
      width: 400px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #444;
      color: white;
    }
  </style>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabaseUrl = "https://wpilukuwehxphmorjxzd.supabase.co";
    const supabaseAnonKey = "YOUR_ANON_KEY"; // replace with your real anon key
    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    async function loadUser() {
      const { data } = await supabase.auth.getSession();
      const user = data.session?.user;
      if (user) {
        const username = user.user_metadata?.full_name || user.user_metadata?.name || user.email;
        document.getElementById("welcome").textContent = `Welcome back, ${username}!`;
      } else {
        document.getElementById("welcome").textContent = "Not logged in.";
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = "/";
    }

    window.addEventListener("load", loadUser);
    window.logout = logout;
  </script>
</head>
<body>
  <h1 id="welcome">Loading...</h1>
  <div class="box">
    <p>You are now inside the AetherClan portal.</p>
    <p>Choose where to go:</p>
    <button onclick="window.location.href='/community'">Community Area</button>
    <button onclick="window.location.href='/admin-dashboard'">Admin Dashboard</button>
    <button onclick="logout()">Logout</button>
  </div>
</body>
</html>
